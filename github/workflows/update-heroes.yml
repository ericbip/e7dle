name: Update Hero Data

on:
  schedule:
    - cron: '0 9 * * 1'  # Cada lunes a las 9:00 UTC
  workflow_dispatch:      # También se puede lanzar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scrape script
        run: node scripts/scrape.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/characters.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if heroes changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/characters.js
          git commit -m "chore: update hero data [$(date +'%Y-%m-%d')]"
          git push
